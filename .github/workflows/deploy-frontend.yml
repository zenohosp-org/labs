name: Deploy frontend to VPS
on:
  push:
    branches: [main]
    paths:
      - 'labs-frontend/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build and deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/zenohosp/labs
            git pull origin main
            cd labs-frontend
            npm ci
            npm run build
            rm -rf /var/www/labs/*
            cp -r dist/* /var/www/labs/
