name: Deploy backend to VPS
on:
  push:
    branches: [main]
    paths:
      - 'labs-backend/**'
# Both deploy workflows git-pull the same VPS checkout (/opt/zenohosp/labs);
# a shared group serializes them so concurrent pulls can't race on the ref.
concurrency:
  group: vps-deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/zenohosp/labs
            git pull origin main
            cd /opt/zenohosp
            docker compose up -d --build labs-backend
