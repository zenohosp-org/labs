spring.application.name=labs-server

# ──────────────────────────────────────────────
# Database — PostgreSQL (Supabase Pooled, shared with HMS)
# ──────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# ──────────────────────────────────────────────
# JPA / Hibernate
# Labs auto-creates only its own table (lab_orders); other tables (patients,
# hospitals, admissions, users, hospital_services) are HMS-owned and read-only.
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ──────────────────────────────────────────────
# Flyway — adopted from Phase 0 of the robust-labs roadmap.
# baseline-on-migrate=true makes it safe to enable against the Supabase that
# already has the bootstrap schema (Hibernate built it). Flyway treats the
# current DB as baseline V0 and only runs V1+ from classpath:db/migration.
# Coexists with ddl-auto=update for now; we'll flip to validate once Flyway
# owns every labs schema change.
# ──────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=labs baseline pre-Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=${PORT:8086}
server.forward-headers-strategy=FRAMEWORK

# Response compression. Nothing sits in front of the jar (the Dockerfile runs
# it directly — no nginx), so Tomcat has to do this itself.
#
# Needed because GET /api/lab-services is unpaginated and the catalogue is now
# 1901 rows per tenant after the LOINC 2.82 seed. PerAnalyteResultEntry pulls
# the whole active set on every open. Measured on real data: 1527 KB raw →
# 123 KB gzipped (12.3x). The aliases column is ~500 KB of that and compresses
# especially well — highly repetitive synonym lists.
#
# min-response-size keeps the CPU cost off the small responses that make up
# most traffic; only payloads above 1 KB get compressed.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# ──────────────────────────────────────────────
# JWT (MUST match Directory + HMS JWT_SECRET)
# ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ──────────────────────────────────────────────
# Shared SSO Cookie
# ──────────────────────────────────────────────
sso.cookie.name=${SSO_COOKIE_NAME:sso_token}
sso.cookie.domain=${SSO_COOKIE_DOMAIN:zenohosp.com}
sso.cookie.secure=${SSO_COOKIE_SECURE:true}
sso.cookie.max-age=${SSO_COOKIE_MAX_AGE:86400}

# ──────────────────────────────────────────────
# Frontend URL (post-SSO redirect)
# ──────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:https://labs.zenohosp.com}

# ──────────────────────────────────────────────
# Directory SSO OAuth2 Client
# ──────────────────────────────────────────────
spring.security.oauth2.client.registration.directory.client-id=${DIRECTORY_CLIENT_ID:labs-client}
spring.security.oauth2.client.registration.directory.client-secret=${DIRECTORY_CLIENT_SECRET}
spring.security.oauth2.client.registration.directory.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.directory.redirect-uri=${DIRECTORY_REDIRECT_URI:https://api-labs.zenohosp.com/login/oauth2/code/directory}
spring.security.oauth2.client.registration.directory.scope=read

spring.security.oauth2.client.provider.directory.authorization-uri=${DIRECTORY_AUTH_URI:https://api-directory.zenohosp.com/oauth2/authorize}
spring.security.oauth2.client.provider.directory.token-uri=${DIRECTORY_TOKEN_URI:https://api-directory.zenohosp.com/oauth2/token}
spring.security.oauth2.client.provider.directory.user-info-uri=${DIRECTORY_USER_INFO_URI:https://api-directory.zenohosp.com/api/users/me}
spring.security.oauth2.client.provider.directory.user-name-attribute=email

directory.api.url=${DIRECTORY_API_URL:https://api-directory.zenohosp.com}

# ──────────────────────────────────────────────
# HMS API (proxy target for hospital-services)
# HMS owns the table; labs forwards CRUD calls verbatim.
# ──────────────────────────────────────────────
hms.api.url=${HMS_API_URL:http://localhost:9001}

# ──────────────────────────────────────────────
# V14 — radiology lazy seed (Phase 8.0). Master switch defaults OFF so prod
# is unaffected until per-tenant rollout begins. Override in env-specific
# profile (application-<env>.properties) or via env var SPRING_APPLICATION_JSON.
#   labs.seed.radiology.enabled=true
#   labs.seed.radiology.allowed-hospital-ids=<csv UUIDs> | ALL
# ──────────────────────────────────────────────
labs.seed.radiology.enabled=false
labs.seed.radiology.allowed-hospital-ids=

# ──────────────────────────────────────────────
# Debug
# ──────────────────────────────────────────────
logging.level.com.labs=INFO

# Timezone — all hospitals run in IST. The Dockerfile pins the JVM via TZ env +
# -Duser.timezone (so LocalDateTime.now() returns IST); this also makes Jackson
# emit Instant/Date in IST. Mirrors HMS.
spring.jackson.time-zone=Asia/Kolkata
